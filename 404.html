<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#2563eb;--primary-hover:#114fd7;--primary-alpha:#2563eb15;--bg:#0a0a0b;--bg-card:#18181b;--fg:#fafafa;--fg-muted:#a1a1aa;--border:#27272a;--radius:12px;--font:system-ui,-apple-system,sans-serif}
body{font-family:var(--font);background:var(--bg);color:var(--fg);min-height:100vh;line-height:1.5}
.hide{display:none!important}
.btn{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:8px;border:none;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;text-decoration:none;background:var(--primary);color:white}
.btn:hover{background:var(--primary-hover)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--fg)}
.btn-outline:hover{background:var(--bg-card);border-color:var(--primary);color:var(--primary)}
.btn-ghost{background:transparent;color:var(--fg-muted)}
.btn-ghost:hover{color:var(--fg);background:var(--bg-card)}
.btn-icon{width:36px;height:36px;padding:0;justify-content:center}
.card{border-radius:var(--radius);border:1px solid var(--border);padding:16px;background:var(--bg-card);transition:all .2s}
.card:hover{border-color:var(--primary);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.page{max-width:800px;margin:0 auto;padding:24px 16px}
.flex{display:flex;align-items:center;gap:8px}
.flex-col{display:flex;flex-direction:column;gap:8px}
.gap-2{gap:16px}
.gap-3{gap:24px}
.gap-4{gap:32px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.text-center{text-align:center}
.text-sm{font-size:14px}
.text-xs{font-size:12px}
.text-muted{color:var(--fg-muted)}
.font-bold{font-weight:700}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mt-1{margin-top:8px}
.mt-2{margin-top:16px}
.mt-3{margin-top:24px}
.mb-2{margin-bottom:16px}
.mb-3{margin-bottom:24px}
.py-4{padding-top:32px;padding-bottom:32px}

.badge-success{background:#22c55e20;color:#22c55e}

.check-icon.done{background:#22c55e20;color:#22c55e}
.video-wrap{position:relative;width:100%;padding-bottom:56.25%;border-radius:var(--radius);overflow:hidden;background:black;margin-bottom:16px}
.video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%}
.mat-list{display:flex;flex-direction:column;gap:8px}
.mat-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;transition:all .2s;text-decoration:none;color:inherit}
.mat-item:hover{background:var(--bg-card)}

.nav-top{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--bg-card)}
.nav-top .back-btn{background:none;border:none;color:var(--fg-muted);cursor:pointer;padding:6px;border-radius:6px;display:flex}
.nav-top .back-btn:hover{background:var(--bg);color:var(--fg)}

.mobile-nav a,.mobile-nav button{background:none;border:none;color:var(--fg-muted);cursor:pointer;padding:6px;border-radius:6px;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;text-decoration:none}

@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@media(max-width:640px){.grid{grid-template-columns:1fr}.page{padding:16px 12px}.hide-mobile{display:none!important}}
</style>

// === Auth ===
const AUTH_KEY = 'ares_auth_' + DATA.config.id;
const CODIGO_HASH = DATA.config.auth.codigo_acesso_hash;
async function hashString(str) {
  const encoder = new TextEncoder();
  const data = encoder.encode(str);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}
function isLoggedIn() { return !!sessionStorage.getItem(AUTH_KEY); }
async function login(code) {
  if (await hashString(code) === CODIGO_HASH) {
    sessionStorage.setItem(AUTH_KEY, '1');
    return true;
  }
  return false;
}
function logout() { sessionStorage.removeItem(AUTH_KEY); navigate('login'); }
function togglePw(btn) {
  const inp = btn.previousElementSibling;
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '👁‍🗨';
}
async function handleLogin() {
  const code = document.getElementById('loginCode').value;
  if (await login(code)) { navigate('dashboard'); }
  else { document.getElementById('loginError').innerHTML = '<div class="error-msg">Código inválido</div>'; }
}

// === Progress ===
const PROG_KEY = 'ares_progress_' + DATA.config.id;
function getProgress() {
  try { return new Set(JSON.parse(localStorage.getItem(PROG_KEY) || '[]')); } catch { return new Set(); }
}
function saveProgress(set) { localStorage.setItem(PROG_KEY, JSON.stringify([...set])); }
function toggleAula(id) {
  const p = getProgress();
  if (p.has(id)) p.delete(id); else p.add(id);
  saveProgress(p);
  render();
}
function isCompleted(id) { return getProgress().has(id); }
function progModulo(aulaIds) {
  if (!aulaIds.length) return 0;
  const done = aulaIds.filter(id => isCompleted(id)).length;
  return Math.round(done / aulaIds.length * 100);
}
function progGeral() {
  const total = DATA.aulas.length;
  if (!total) return 0;
  return Math.round(getProgress().size / total * 100);
}

// === Helpers ===
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function aulasDoModulo(modId) {
  return DATA.aulas.filter(a => a.moduloId === modId).sort((a, b) => a.ordem - b.ordem);
}
function modPorSlug(slug) { return DATA.modulos.find(m => m.slug === slug); }
function aulaPorSlug(slug) { return DATA.aulas.find(a => a.slug === slug); }
function modPorId(id) { return DATA.modulos.find(m => m.id === id); }
function aulaAnterior(aula) {
  const aulas = aulasDoModulo(aula.moduloId);
  const idx = aulas.findIndex(a => a.id === aula.id);
  return idx > 0 ? aulas[idx - 1] : null;
}
function proxAula(aula) {
  const aulas = aulasDoModulo(aula.moduloId);
  const idx = aulas.findIndex(a => a.id === aula.id);
  return idx < aulas.length - 1 ? aulas[idx + 1] : null;
}

// === Router ===
function getRoute() {
  let path = location.hash.replace(/^#\/?/, '').replace(/^\/+|\/+$/g, '');
  if (!path) path = location.pathname.replace(/^\/+|\/+$/g, '');
  if (!path || path === 'index.html' || path === 'login') return { page: 'login' };
  const parts = path.split('/');
  if (parts[0] === 'dashboard') return { page: 'dashboard' };
  if (parts[0] === 'modulo' && parts[1]) return { page: 'modulo', slug: parts[1] };
  if (parts[0] === 'aula' && parts[1]) return { page: 'aula', slug: parts[1] };
  return { page: 'dashboard' };
}

function navigate(path) {
  const next = '#/' + path.replace(/^\/+/, '');
  if (location.hash === next) render();
  else location.hash = next;
}

window.addEventListener('hashchange', render);
document.addEventListener('click', e => {
  const a = e.target.closest('a[data-nav]');
  if (a) { e.preventDefault(); navigate(a.getAttribute('href').replace(/^#/, '')); }
});

  arrowRight: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>',
  clock: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
  sun: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>',
  moon: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>',
  award: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>',
  logout: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>',
  extLink: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>',
  file: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
};

// === Pages ===
function renderLogin() {
  return `
<div class="page" style="max-width:360px;padding-top:80px">
  <div class="text-center" style="margin-bottom:32px">
    <div class="logo">M</div>
    <h1 style="font-size:20px;font-weight:700">Método ARES Completo</h1>
    <p class="text-sm text-muted mt-1">Insira o código de acesso</p>
  </div>
  <div class="flex-col gap-2">
    <div class="flex-col" style="gap:4px">
      <label class="text-sm font-bold">Código de Acesso</label>
      <div class="input-group">
        <input class="input" id="loginCode" type="password" placeholder="••••••" required>
        <button type="button" class="toggle-pw" onclick="togglePw(this)">👁</button>
      </div>
    </div>
    <div id="loginError"></div>
    <button type="button" onclick="handleLogin()" class="btn w-full" style="justify-content:center;height:44px">Entrar</button>
  </div>
</div>
  `;
}

function renderDashboard() {
  const concluidas = getProgress().size;
  const total = DATA.aulas.length;
  const geral = progGeral();
  const next = DATA.modulos.reduce((found, mod) => {
    if (found) return found;
    const am = aulasDoModulo(mod.id);
    const nao = am.find(a => !isCompleted(a.id));
    return nao ? { modulo: mod, aula: nao } : null;
  }, null);

  return `
<div class="page">
  <div style="margin-bottom:32px">
    <h1 style="font-size:22px;font-weight:700">Olá, ARES Educação.</h1>
    <p class="text-sm text-muted mt-1">${next ? 'Continue de onde parou. Você completou ' + concluidas + ' de ' + total + ' aulas.' : 'Você concluiu todas as aulas! 🎉'}</p>
  </div>

  <div style="margin-bottom:32px">
    <div class="flex" style="justify-content:space-between;margin-bottom:4px">
      <span class="text-sm text-muted">Progresso geral</span>
      <span class="text-sm font-bold" style="font-variant-numeric:tabular-nums">${geral}%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${geral}%"></div></div>
  </div>

  ${next ? `
  <div style="margin-bottom:32px">
    <div class="flex text-sm text-muted" style="margin-bottom:8px">
      <span>${ICONS.play}</span>
      <span>Continuar aprendizado</span>
    </div>
    <a data-nav href="#/aula/${next.aula.slug}" class="card" style="display:block;text-decoration:none;color:inherit;padding:20px;background:linear-gradient(135deg,var(--primary-alpha),transparent)">
      <p class="text-xs text-muted" style="text-transform:uppercase;font-weight:500;letter-spacing:0.05em">${escapeHtml(next.modulo.titulo)}</p>
      <h2 style="font-size:18px;font-weight:600;margin-top:4px">${escapeHtml(next.aula.titulo)}</h2>
      <p class="text-sm text-muted mt-1">${escapeHtml(next.aula.descricao || '')}</p>
      <div class="flex text-xs text-muted" style="margin-top:12px;gap:12px">
        <span>${ICONS.clock} ${next.aula.duracao}</span>
        <span>Aula ${next.aula.ordem}</span>
      </div>
    </a>
  </div>
  ` : ''}

  <div>
    <div class="flex text-sm text-muted" style="margin-bottom:12px">
      <span>${ICONS.book}</span>
      <span>Seus módulos</span>
    </div>
    <div class="grid">
      ${DATA.modulos.sort((a,b) => a.ordem - b.ordem).map(mod => {
        const am = aulasDoModulo(mod.id);
        const prog = progModulo(mod.aulas);
        return `
        <a data-nav href="#/modulo/${mod.slug}" class="card" style="display:block;text-decoration:none;color:inherit">
          <div class="flex" style="gap:12px">
            <div class="icon-box">${ICONS.book}</div>
            <div style="flex:1;min-width:0">
              <div class="flex" style="justify-content:space-between;gap:8px">
                <h3 class="text-sm font-bold truncate">${escapeHtml(mod.titulo)}</h3>
                <span class="text-xs font-bold text-muted" style="font-variant-numeric:tabular-nums;flex-shrink:0">${prog}%</span>
              </div>
              <span class="text-xs text-muted">${am.length} aulas</span>
            </div>
          </div>
          <div class="progress-bar" style="margin-top:12px"><div class="progress-fill" style="width:${prog}%"></div></div>
        </a>
        `;
      }).join('')}
    </div>
  </div>
</div>
<div class="mobile-nav">
  <a data-nav href="#/dashboard" class="active"><span class="nav-icon active">${ICONS.dash}</span> Início</a>
  <button onclick="logout()"><span class="nav-icon">${ICONS.logout}</span> Sair</button>
</div>
  `;
}

function renderModulo(slug) {
  const mod = modPorSlug(slug);
  if (!mod) return '<div class="page text-center py-4"><p class="text-muted">Módulo não encontrado.</p></div>';
  const aulas = aulasDoModulo(mod.id);
  const prog = progModulo(mod.aulas);
  const nextIncomplete = aulas.find(a => !isCompleted(a.id));
  const theme = document.documentElement.getAttribute('data-theme');

  return `
<div class="nav-top">
  <a data-nav href="#/dashboard" class="back-btn" title="Dashboard">${ICONS.arrowLeft}</a>
  <span class="text-sm text-muted">Dashboard</span>
</div>
<div class="page">
  <div class="flex" style="gap:16px;margin-bottom:24px">
    <div class="icon-box" style="width:48px;height:48px;font-size:20px">${ICONS.book}</div>
    <div style="flex:1;min-width:0">
      <h1 style="font-size:22px;font-weight:700">${escapeHtml(mod.titulo)}</h1>
      <p class="text-sm text-muted mt-1">${escapeHtml(mod.descricao || '')}</p>
      <div class="flex text-xs text-muted" style="margin-top:8px;gap:16px">
        <span>${aulas.length} aulas</span>
        <span class="font-bold" style="font-variant-numeric:tabular-nums">${prog}% concluído</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
    </div>
  </div>

  ${nextIncomplete ? `
  <button onclick="navigate('aula/' + '${nextIncomplete.slug}')" class="btn w-full" style="justify-content:center;height:44px;margin-bottom:24px">
    ${ICONS.play} Continuar ${nextIncomplete.titulo} ${ICONS.arrowRight}
  </button>
  ` : ''}

  <div class="flex-col">
    ${aulas.map((aula, idx) => {
      const done = isCompleted(aula.id);
      return `
      <a data-nav href="#/aula/${aula.slug}" class="aula-item ${done ? 'completed' : ''}">
        <div class="check-icon ${done ? 'done' : ''}">${done ? ICONS.check : (idx + 1).toString().padStart(2,'0')}</div>
        <div style="flex:1;min-width:0">
          <span class="aula-title text-sm font-bold">${escapeHtml(aula.titulo)}</span>
        </div>
        <span class="text-xs text-muted" style="font-variant-numeric:tabular-nums">${aula.duracao}</span>
      </a>
      `;
    }).join('')}
  </div>
</div>
<div class="mobile-nav">
  <a data-nav href="#/dashboard"><span class="nav-icon">${ICONS.dash}</span> Início</a>
  <span style="color:var(--primary)"><span class="nav-icon" style="background:var(--primary-alpha);color:var(--primary)">${ICONS.book}</span> Módulo</span>
  <button onclick="logout()"><span class="nav-icon">${ICONS.logout}</span> Sair</button>
</div>
  `;
}

function renderAula(slug) {
  const aula = aulaPorSlug(slug);
  if (!aula) return '<div class="page text-center py-4"><p class="text-muted">Aula não encontrada.</p></div>';
  const mod = modPorId(aula.moduloId);
  const done = isCompleted(aula.id);
  const ant = aulaAnterior(aula);
  const prox = proxAula(aula);

  return `
<div class="nav-top">
  <a data-nav href="${mod ? '#/modulo/' + mod.slug : '#/dashboard'}" class="back-btn" title="${mod ? escapeHtml(mod.titulo) : ''}">${ICONS.arrowLeft}</a>
  <span class="text-sm text-muted truncate">${mod ? escapeHtml(mod.titulo) : ''}</span>
  <span class="text-xs text-muted">/</span>
  <span class="text-sm truncate" style="max-width:200px">${escapeHtml(aula.titulo)}</span>
</div>
<div class="page">
  <div class="video-wrap">
    <iframe src="https://www.youtube-nocookie.com/embed/${aula.youtubeId}?rel=0" title="${escapeHtml(aula.titulo)}" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>
  </div>

  <div class="flex" style="justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:24px">
    <div>
      <div class="flex text-xs text-muted" style="gap:12px;margin-bottom:4px">
        <span>${ICONS.clock} ${aula.duracao}</span>
        <span>Aula ${aula.ordem}</span>
      </div>
      <h1 style="font-size:20px;font-weight:700">${escapeHtml(aula.titulo)}</h1>
      <p class="text-sm text-muted mt-1" style="max-width:480px">${escapeHtml(aula.descricao || '')}</p>
    </div>
    <button onclick="toggleAula('${aula.id}')" class="btn ${done ? 'btn-outline' : ''}" style="flex-shrink:0;height:40px">
      ${done ? ICONS.checkCircle + ' Concluída' : ICONS.circle + ' Concluir aula'}
    </button>
  </div>

  ${aula.materiais && aula.materiais.length ? `
  <div class="card" style="margin-bottom:24px">
    <h3 style="font-size:14px;font-weight:600;margin-bottom:12px">Materiais de apoio</h3>
    <div class="mat-list">
      ${aula.materiais.map(mat => `
      <a href="${escapeHtml(mat.url)}" target="_blank" rel="noopener" class="mat-item">
        <div class="mat-icon">${ICONS.file}</div>
        <div style="flex:1;min-width:0">
          <span class="text-sm font-bold truncate" style="display:block">${escapeHtml(mat.titulo)}</span>
          <span class="text-xs text-muted" style="text-transform:uppercase;letter-spacing:0.05em">${mat.tipo === 'pdf' ? 'PDF' : mat.tipo === 'zip' ? 'ZIP' : 'Link externo'}</span>
        </div>
        ${ICONS.extLink}
      </a>
      `).join('')}
    </div>
  </div>
  ` : ''}

  <div class="flex" style="justify-content:space-between;gap:12px">
    ${ant ? '<a data-nav href="#/aula/' + ant.slug + '" class="btn btn-outline">' + ICONS.arrowLeft + ' Anterior</a>' : '<div></div>'}
    ${prox ? '<a data-nav href="#/aula/' + prox.slug + '" class="btn">Próxima ' + ICONS.arrowRight + '</a>' : mod ? '<a data-nav href="#/modulo/' + mod.slug + '" class="btn btn-outline">' + ICONS.check + ' Finalizar módulo</a>' : '<div></div>'}
  </div>

  <div style="height:56px"></div>
</div>
<div class="mobile-nav">
  <a data-nav href="#/dashboard"><span class="nav-icon">${ICONS.dash}</span> Início</a>
  <a data-nav href="${mod ? '#/modulo/' + mod.slug : '#/dashboard'}"><span class="nav-icon">${ICONS.book}</span> Módulo</a>
  <span style="color:var(--primary)"><span class="nav-icon" style="background:var(--primary-alpha);color:var(--primary)">${ICONS.play}</span> Aula</span>
  <button onclick="logout()"><span class="nav-icon">${ICONS.logout}</span> Sair</button>
</div>
  `;
}

// === Render ===
function render() {
  if (!isLoggedIn()) { document.getElementById('app').innerHTML = renderLogin(); return; }
  const route = getRoute();
  if (route.page === 'login') { navigate('dashboard'); return; }
  let html = '';
  if (route.page === 'modulo') html = renderModulo(route.slug);
  else if (route.page === 'aula') html = renderAula(route.slug);
  else html = renderDashboard();
  document.getElementById('app').innerHTML = html;
}

render();
</script>
</body>
</html>
